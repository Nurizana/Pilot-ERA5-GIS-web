<!DOCTYPE html>
<html>
<head>
    <title>ERA5 Monthly Weather Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    
    <!-- jQuery (Required for fetching JSON) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Leaflet Velocity Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.6.0/dist/leaflet-velocity.min.css"/>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; background: #111; }
        
        /* Slide-out Control Panel Styles */
        #control-panel {
            position: absolute;
            top: 20px;
            right: -300px; /* Hidden off-screen initially */
            width: 280px;
            height: 90%;
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            z-index: 1000;
            transition: right 0.4s ease-in-out;
            padding: 20px;
            border-radius: 10px 0 0 10px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        /* Invisible trigger area on the right edge */
        #hover-trigger {
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 100%;
            z-index: 999;
        }

        /* Show panel when hovering over the trigger or the panel itself */
        #hover-trigger:hover + #control-panel,
        #control-panel:hover {
            right: 0;
        }

        .panel-section {
            margin-bottom: 25px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
        }
        
        /* Remove border from the last section */
        .panel-section:last-child {
            border-bottom: none;
        }

        .panel-section h3 {
            margin-top: 0;
            font-size: 16px;
            color: #4da6ff;
        }

        label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        select, button {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }

        button.play-btn {
            background: #4da6ff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.play-btn:hover {
            background: #3388dd;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Hover Trigger Area -->
    <div id="hover-trigger"></div>

    <!-- Sliding Control Panel -->
    <div id="control-panel">
        
        <div class="panel-section">
            <h3>1. Base Map</h3>
            <label><input type="radio" name="basemap" value="dark" checked> Night Vision (with labels)</label>
            <label><input type="radio" name="basemap" value="ocean"> Blue Oceans (with labels)</label>
        </div>

        <div class="panel-section">
            <h3>2. Weather Parameter</h3>
            <label><input type="radio" name="parameter" value="wind_static" checked> Wind (850 hPa)</label>
            <label><input type="radio" name="parameter" value="temp"> Temperature</label>
            <label><input type="radio" name="parameter" value="geo"> Geopotential</label>
            <label><input type="radio" name="parameter" value="rain"> Specific Rain Water Content</label>
            <em style="font-size: 11px; color: #aaa;">Note: Static map parameters require backend JSON/image generation to display.</em>
        </div>

        <div class="panel-section">
            <h3>3. Time Selection</h3>
            <select id="sel-year"><option>2026</option></select>
            <select id="sel-month"><option>June</option></select>
            <select id="sel-day">
                <option>01</option><option>02</option><option>03</option>
            </select>
            <select id="sel-time">
                <option>00:00</option><option>06:00</option><option>12:00</option><option>18:00</option>
            </select>
        </div>

        <div class="panel-section">
            <h3>4. Animation Controls</h3>
            <button class="play-btn" onclick="togglePlay()">▶ Play Animation</button>
            <em style="font-size: 11px; color: #aaa;">Requires multi-timestep data.</em>
        </div>

        <div class="panel-section">
            <h3>5. Wind Overlay</h3>
            <label><input type="checkbox" id="toggle-wind-anim" checked> Animated Wind Particles (850 hPa)</label>
        </div>

    </div>

    <script>
        // --- 1. Initialize Map ---
        var map = L.map('map', {
            zoomControl: false // Move zoom control out of the way of the panel
        }).setView([20, 0], 3);
        L.control.zoom({ position: 'topleft' }).addTo(map);
        
        // --- 2. Define Basemaps ---
        var darkMap = L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap & CartoDB'
        });
        
        var oceanMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri'
        });

        // Set default basemap
        darkMap.addTo(map);

        // --- 3. Initialize Wind Layer Variable ---
        var velocityLayer = null;

        // Fetch data and create wind layer
        $.getJSON('data.json', function (data) {
            velocityLayer = L.velocityLayer({
                displayValues: true,
                displayOptions: {
                    velocityType: 'Wind (850 hPa)',
                    position: 'bottomleft',
                    emptyString: 'No wind data'
                },
                data: data,
                maxVelocity: 25,
                colorScale: [
                    "#3288bd", "#66c2a5", "#abdda4", "#e6f598", 
                    "#fee08b", "#fdae61", "#f46d43", "#d53e4f"
                ]
            });
            
            // Add by default if the checkbox is checked initially
            if ($('#toggle-wind-anim').is(':checked')) {
                velocityLayer.addTo(map);
            }
        }).fail(function() {
            console.error("Could not load data.json.");
        });

        // --- 4. UI Interaction Logic ---

        // Switch Basemap
        $('input[name="basemap"]').change(function() {
            var selected = $(this).val();
            if (selected === 'dark') {
                map.removeLayer(oceanMap);
                darkMap.addTo(map);
            } else if (selected === 'ocean') {
                map.removeLayer(darkMap);
                oceanMap.addTo(map);
            }
        });

        // Switch Parameter Layer (Placeholder for future static layers)
        $('input[name="parameter"]').change(function() {
            var selected = $(this).val();
            console.log("Selected static parameter: " + selected + ". Waiting for data backend to support this.");
            // Future logic to toggle static map layers (like colored temperature grids) will go here.
        });

        // Toggle Animated Wind Overlay (Section 5)
        $('#toggle-wind-anim').change(function() {
            if (!velocityLayer) return; // Do nothing if data hasn't loaded yet

            if ($(this).is(':checked')) {
                velocityLayer.addTo(map);
            } else {
                map.removeLayer(velocityLayer);
            }
        });

        // Play Button logic (Placeholder)
        var isPlaying = false;
        function togglePlay() {
            isPlaying = !isPlaying;
            var btn = document.querySelector('.play-btn');
            if (isPlaying) {
                btn.innerHTML = '⏸ Pause Animation';
                btn.style.background = '#ff4d4d';
            } else {
                btn.innerHTML = '▶ Play Animation';
                btn.style.background = '#4da6ff';
            }
        }
    </script>
</body>
</html>
