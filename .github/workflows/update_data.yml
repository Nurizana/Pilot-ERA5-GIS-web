name: Update Monthly ERA5 Data

on:
  schedule:
    - cron: '0 0 2 * *' # Runs at 00:00 UTC on the 2nd day of every month
  workflow_dispatch: # Allows you to run it manually from the Actions tab

permissions:
  contents: write # Grants permission for the action to push code back to your repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cdsapi xarray netCDF4 numpy

      - name: Create .cdsapirc file
        run: |
          echo "url: https://cds.climate.copernicus.eu/api" > ~/.cdsapirc
          echo "key: ${{ secrets.CDS_API_KEY }}" >> ~/.cdsapirc

      - name: Run data processing script
        run: python process_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Automated update of monthly ERA5 data" || exit 0
          git push
